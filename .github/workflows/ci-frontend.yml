name: CI (frontend)

on:
  push:
    branches: [master]
    paths:
      - "frontend/**"
      - "!frontend/public/**"
      - "!frontend/vercel.json"
      - "!frontend/.env.example"
      - "!frontend/.prettierrc"
      - "!frontend/.prettierignore"
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend / Lint, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Test (Vitest)
        run: npm run test

      - name: Build (TypeScript + Vite)
        run: npm run build
